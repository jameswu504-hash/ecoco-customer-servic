<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECOCO 客服後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ecoco-orange:#FF5000;
      --ecoco-blue:  #060E9F;
      --ecoco-yellow:#FFCE00;
      --ecoco-sky:   #8EB9C9;
      --ecoco-beige: #FAE0B8;
      --ecoco-teal:  #0076A9;
      --green-dark: var(--ecoco-blue);
      --green-main: var(--ecoco-blue);
      --green-mid:  var(--ecoco-orange);
      --green-light:var(--ecoco-yellow);
      --green-pale: #fff1cc;
      --green-ghost:#f7f8fb;
      --bg: #f7f8fb;
      --white: #ffffff;
      --black: #20242c;
      --gray-mid: #6d7480;
      --gray-light:#c9d4dc;
      --radius: 8px;
      --shadow: 0 8px 24px rgba(6,14,159,0.08);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--black); }

    /* Header */
    .header {
      background:var(--green-dark);
      padding:0 28px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
      border-top:6px solid var(--ecoco-orange);
      box-shadow:0 2px 18px rgba(6,14,159,0.22);
    }
    .header-brand { display:flex; align-items:center; gap:10px; }
    .brand-logo {
      width:134px; height:42px; object-fit:contain; display:block; flex-shrink:0;
      background:white; border-radius:8px; padding:4px 6px;
    }
    .header-title { color:white; font-size:16px; font-weight:700; }
    .header-sub { color:var(--green-light); font-size:11px; font-family:'Space Mono',monospace; }
    .header-right { display:flex; gap:12px; align-items:center; }
    .refresh-btn {
      padding:6px 14px; background:var(--green-mid); color:white;
      border:none; border-radius:8px; font-size:12px; cursor:pointer;
      font-family:'Noto Sans TC',sans-serif;
    }
    .refresh-btn:hover { background:var(--green-light); color:var(--green-dark); }
    .back-link { color:var(--green-light); text-decoration:none; font-size:12px; font-family:'Space Mono',monospace; }

    .container { max-width:1100px; margin:0 auto; padding:24px 20px; }

    /* 統計卡片 */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
    .stat-card {
      background:var(--white); border-radius:var(--radius); padding:20px;
      box-shadow:var(--shadow); border:1px solid #dfe6ee;
    }
    .stat-num { font-size:32px; font-weight:700; color:var(--green-main); font-family:'Space Mono',monospace; }
    .stat-label { font-size:13px; color:var(--gray-mid); margin-top:4px; }
    .stat-icon { font-size:20px; margin-bottom:8px; }

    /* 區塊標題 */
    .section-title { font-size:15px; font-weight:700; color:var(--green-dark); margin-bottom:14px; display:flex; align-items:center; gap:8px; }

    /* 關鍵字排行 */
    .keyword-card {
      background:var(--white); border-radius:var(--radius); padding:20px;
      box-shadow:var(--shadow); border:1px solid #dfe6ee;
    }
    .keyword-item {
      display:flex; align-items:center; gap:10px;
      padding:8px 0; border-bottom:1px solid #eef2f7;
    }
    .keyword-item:last-child { border-bottom:none; }
    .keyword-rank {
      width:24px; height:24px; border-radius:50%;
      background:var(--green-pale); color:var(--green-main);
      font-size:11px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; font-family:'Space Mono',monospace;
    }
    .keyword-rank.top3 { background:var(--green-main); color:white; }
    .keyword-name { flex:1; font-size:13px; }
    .keyword-bar-wrap { width:120px; height:8px; background:var(--green-ghost); border-radius:4px; overflow:hidden; }
    .keyword-bar { height:100%; background:var(--green-mid); border-radius:4px; transition:width 0.5s; }
    .keyword-count { font-size:12px; color:var(--gray-mid); font-family:'Space Mono',monospace; width:24px; text-align:right; }

    /* 滿意度 */
    .rating-card {
      background:var(--white); border-radius:var(--radius); padding:20px;
      box-shadow:var(--shadow); border:1px solid #dfe6ee;
    }
    .rating-bar-wrap { display:flex; align-items:center; gap:12px; margin:8px 0; }
    .rating-label { font-size:13px; width:70px; }
    .rating-track { flex:1; height:12px; background:var(--green-ghost); border-radius:6px; overflow:hidden; }
    .rating-fill { height:100%; border-radius:6px; transition:width 0.5s; }
    .rating-fill.positive { background:var(--ecoco-teal); }
    .rating-fill.negative { background:#e07070; }
    .rating-pct { font-size:12px; font-family:'Space Mono',monospace; width:36px; text-align:right; color:var(--gray-mid); }

    .overview-card {
      background:var(--white); border-radius:var(--radius); padding:20px;
      box-shadow:var(--shadow); border:1px solid #dfe6ee; margin-bottom:28px;
    }
    .overview-grid {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:12px; margin-bottom:18px;
    }
    .overview-metric {
      border:1px solid #e6ecf2; border-radius:8px; padding:12px;
      background:var(--green-ghost);
    }
    .overview-value {
      font-size:22px; font-weight:700; color:var(--green-main);
      font-family:'Space Mono',monospace; overflow-wrap:anywhere;
    }
    .overview-label { font-size:12px; color:var(--gray-mid); margin-top:3px; }
    .overview-columns { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .source-list, .category-list { display:flex; flex-direction:column; gap:8px; }
    .source-item, .category-item {
      border:1px solid #e6ecf2; border-radius:8px; padding:10px 12px;
      background:white; font-size:13px; line-height:1.5;
    }
    .source-title, .category-title { font-weight:700; color:var(--green-dark); overflow-wrap:anywhere; }
    .source-meta, .category-meta { color:var(--gray-mid); font-size:12px; margin-top:2px; overflow-wrap:anywhere; }

    /* 對話紀錄 */
    .sessions-card {
      background:var(--white); border-radius:var(--radius); padding:20px;
      box-shadow:var(--shadow); border:1px solid #dfe6ee; margin-bottom:28px;
    }
    .session-item { border:1px solid #dfe6ee; border-radius:8px; margin-bottom:12px; overflow:hidden; }
    .session-header {
      display:flex; align-items:center; gap:12px; padding:12px 16px;
      background:var(--green-ghost); cursor:pointer; user-select:none;
    }
    .session-header:hover { background:var(--green-pale); }
    .session-id {
      font-size:11px; font-family:'Space Mono',monospace; color:var(--green-main);
      background:var(--green-pale); padding:2px 8px; border-radius:6px;
    }
    .session-meta { font-size:12px; color:var(--gray-mid); flex:1; }
    .session-count { font-size:11px; font-family:'Space Mono',monospace; color:var(--green-main); }
    .session-toggle { font-size:12px; color:var(--gray-mid); }
    .session-messages { display:none; padding:12px 16px; }
    .session-messages.open { display:block; }
    .msg-item { display:flex; gap:10px; margin-bottom:10px; align-items:flex-start; }
    .msg-role {
      font-size:10px; font-family:'Space Mono',monospace;
      padding:2px 8px; border-radius:10px; flex-shrink:0; margin-top:2px;
    }
    .msg-role.user      { background:#e0ede8; color:var(--green-main); }
    .msg-role.assistant { background:var(--green-pale); color:var(--green-dark); }
    .msg-content {
      font-size:13px; line-height:1.6; color:var(--black); flex:1;
      white-space:pre-wrap; overflow-wrap:anywhere;
    }
    .msg-time { font-size:10px; color:var(--gray-light); font-family:'Space Mono',monospace; flex-shrink:0; }

    .empty-state { text-align:center; padding:40px; color:var(--gray-mid); font-size:14px; }
    .loading { text-align:center; padding:40px; color:var(--gray-mid); }

    /* ── 登入 Modal ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center; z-index:999;
    }
    .modal-overlay.hidden { display:none; }
    .modal-box {
      background:var(--white); border-radius:8px; padding:32px;
      width:360px; box-shadow:0 8px 40px rgba(0,0,0,0.2); text-align:center;
    }
    .modal-box h2 { font-size:18px; color:var(--green-dark); margin-bottom:8px; }
    .modal-box p  { font-size:13px; color:var(--gray-mid); margin-bottom:20px; }
    .modal-input {
      width:100%; border:1.5px solid #cce0d8; border-radius:8px;
      padding:10px 14px; font-size:14px; outline:none; margin-bottom:12px;
      font-family:'Noto Sans TC',sans-serif;
    }
    .modal-input:focus { border-color:var(--green-mid); }
    .modal-btn {
      width:100%; padding:10px; background:var(--green-main); color:white;
      border:none; border-radius:8px; font-size:14px; cursor:pointer;
      font-family:'Noto Sans TC',sans-serif;
    }
    .modal-btn:hover { background:var(--green-mid); }
    .modal-error { font-size:12px; color:#e07070; margin-top:8px; }

    /* 知識庫編輯器 */
    .knowledge-card {
      background:var(--white); border-radius:var(--radius); padding:20px;
      box-shadow:var(--shadow); border:1px solid #dfe6ee; margin-bottom:28px;
    }
    .knowledge-textarea {
      width:100%; height:320px; border:1.5px solid #cce0d8; border-radius:8px;
      padding:12px; font-size:12px; font-family:'Space Mono',monospace;
      resize:vertical; outline:none; line-height:1.7; color:var(--black);
      background:var(--green-ghost);
    }
    .knowledge-textarea:focus { border-color:var(--green-mid); background:var(--white); }
    .knowledge-actions {
      display:flex; justify-content:space-between; align-items:center; margin-top:10px;
    }
    .knowledge-char { font-size:12px; color:var(--gray-mid); font-family:'Space Mono',monospace; }
    .save-btn {
      padding:8px 20px; background:var(--green-main); color:white;
      border:none; border-radius:8px; font-size:13px; cursor:pointer;
      font-family:'Noto Sans TC',sans-serif; transition:background 0.18s;
    }
    .save-btn:hover { background:var(--green-mid); }
    .save-btn:disabled { background:var(--gray-light); cursor:not-allowed; }
    .save-msg { font-size:12px; font-family:'Space Mono',monospace; }
    .save-msg.ok  { color:var(--green-main); }
    .save-msg.err { color:#e07070; }

    /* 知識庫分類管理 */
    .kb-add-btn {
      padding:6px 14px; background:var(--green-main); color:white;
      border:none; border-radius:8px; font-size:13px; cursor:pointer;
      font-family:'Noto Sans TC',sans-serif;
    }
    .kb-add-btn:hover { background:var(--green-mid); }
    .kb-layout { display:grid; grid-template-columns:240px 1fr; gap:16px; }
    .kb-sidebar {
      max-height:460px; overflow-y:auto;
      border:1px solid #e0ede8; border-radius:10px; padding:8px; background:var(--green-ghost);
    }
    .kb-cat-btn {
      display:flex; justify-content:space-between; align-items:center; gap:8px;
      width:100%; text-align:left; padding:9px 12px; margin-bottom:4px;
      border:1px solid transparent; border-radius:8px; background:var(--white);
      cursor:pointer; font-family:'Noto Sans TC',sans-serif; font-size:13px;
      color:var(--black); transition:all 0.15s;
    }
    .kb-cat-btn:hover { border-color:var(--green-mid); }
    .kb-cat-btn.active { background:var(--green-main); color:white; }
    .kb-cat-btn.active .kb-cat-size { color:var(--green-pale); }
    .kb-cat-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .kb-cat-size { font-size:10px; font-family:'Space Mono',monospace; color:var(--gray-mid); flex-shrink:0; }
    .kb-editor { border:1px solid #e0ede8; border-radius:10px; padding:16px; min-height:340px; }
    .kb-empty { color:var(--gray-mid); font-size:14px; text-align:center; padding:80px 20px; line-height:1.7; }
    .kb-label { display:block; font-size:12px; color:var(--gray-mid); margin:4px 0; }
    .kb-name-input {
      width:100%; border:1.5px solid #cce0d8; border-radius:8px;
      padding:9px 12px; font-size:14px; outline:none; margin-bottom:12px;
      font-family:'Noto Sans TC',sans-serif;
    }
    .kb-name-input:focus { border-color:var(--green-mid); }
    .kb-content-input {
      width:100%; height:300px; border:1.5px solid #cce0d8; border-radius:8px;
      padding:12px; font-size:13px; font-family:'Space Mono',monospace;
      resize:vertical; outline:none; line-height:1.7; color:var(--black);
      background:var(--green-ghost);
    }
    .kb-content-input:focus { border-color:var(--green-mid); background:var(--white); }
    .kb-actions { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .kb-del-btn {
      padding:8px 16px; background:white; color:#e07070; border:1.5px solid #e07070;
      border-radius:8px; font-size:13px; cursor:pointer; font-family:'Noto Sans TC',sans-serif;
    }
    .kb-del-btn:hover { background:#e07070; color:white; }
    @media (max-width:768px) {
      .kb-layout { grid-template-columns:1fr; }
      .overview-columns { grid-template-columns:1fr; }
    }

    /* 搜尋 */
    .search-wrap { margin-bottom:14px; }
    .search-input {
      width:100%; border:1.5px solid #cce0d8; border-radius:8px;
      padding:9px 14px; font-size:13px; outline:none;
      font-family:'Noto Sans TC',sans-serif; background:var(--green-ghost);
    }
    .search-input:focus { border-color:var(--green-mid); background:var(--white); }
    .search-hint { font-size:11px; color:var(--gray-mid); margin-top:5px; font-family:'Space Mono',monospace; }

    /* 評分明細 */
    .ratings-card {
      background:var(--white); border-radius:var(--radius); padding:20px;
      box-shadow:var(--shadow); border:1px solid #dfe6ee; margin-bottom:28px;
    }
    .rating-detail-item {
      display:flex; gap:12px; align-items:flex-start;
      padding:12px 0; border-bottom:1px solid var(--green-ghost);
    }
    .rating-detail-item:last-child { border-bottom:none; }
    .rating-badge {
      flex-shrink:0; font-size:18px; margin-top:2px;
    }
    .rating-detail-body { flex:1; min-width:0; }
    .rating-detail-q { font-size:13px; font-weight:500; color:var(--black); margin-bottom:4px; }
    .rating-detail-a { font-size:12px; color:var(--gray-mid); line-height:1.5; }
    .rating-detail-time { font-size:11px; color:var(--gray-light); font-family:'Space Mono',monospace; flex-shrink:0; white-space:nowrap; margin-top:2px; }

    /* 知識缺口 */
    .unanswered-card {
      background:var(--white); border-radius:var(--radius); padding:20px;
      box-shadow:var(--shadow); border:1px solid #dfe6ee; margin-bottom:28px;
    }
    .unanswered-item {
      display:flex; gap:12px; align-items:flex-start;
      padding:10px 0; border-bottom:1px solid var(--green-ghost);
    }
    .unanswered-item:last-child { border-bottom:none; }
    .unanswered-body { flex:1; min-width:0; }
    .unanswered-q { font-size:13px; line-height:1.6; font-weight:500; overflow-wrap:anywhere; }
    .unanswered-reason { margin-top:4px; font-size:11px; color:var(--green-main); overflow-wrap:anywhere; }
    .unanswered-reply {
      display:none; margin-top:8px; padding:10px 12px; border-left:3px solid var(--green-main);
      border-radius:6px; background:var(--green-ghost);
      font-size:12px; color:var(--gray-mid); line-height:1.7;
      white-space:pre-wrap; overflow-wrap:anywhere;
    }
    .unanswered-item.open .unanswered-reply { display:block; }
    .unanswered-actions { margin-top:8px; display:flex; gap:8px; align-items:center; }
    .unanswered-toggle {
      border:1px solid #cce0d8; background:var(--white); color:var(--green-main);
      border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer;
      font-family:'Noto Sans TC',sans-serif;
    }
    .unanswered-toggle:hover { background:var(--green-pale); }
    .gap-controls {
      display:grid; grid-template-columns:150px 1fr auto; gap:8px; align-items:center;
      margin-top:10px;
    }
    .gap-select, .gap-note {
      border:1px solid #cce0d8; border-radius:8px; padding:7px 9px;
      font-size:12px; font-family:'Noto Sans TC',sans-serif; background:white;
      min-width:0;
    }
    .gap-save {
      border:none; border-radius:8px; padding:7px 12px; cursor:pointer;
      background:var(--green-main); color:white; font-size:12px;
      font-family:'Noto Sans TC',sans-serif;
    }
    .gap-save:hover { background:var(--green-mid); }
    .gap-status {
      display:inline-block; margin-top:6px; padding:2px 8px; border-radius:999px;
      font-size:11px; font-weight:700; background:var(--green-pale); color:var(--green-main);
    }
    .gap-status.resolved { background:#e6f4ef; color:#007f5f; }
    .gap-status.ignored { background:#f1f3f5; color:#6d7480; }
    .gap-status.manual { background:#fff0e6; color:#c95200; }
    .unanswered-meta { font-size:11px; color:var(--gray-mid); font-family:'Space Mono',monospace; flex-shrink:0; white-space:nowrap; }
    .unanswered-icon { font-size:16px; flex-shrink:0; margin-top:1px; }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr !important; }
      .header { padding:0 14px; }
      .header-brand { min-width:0; gap:8px; }
      .brand-logo { width:112px; height:36px; padding:3px 5px; }
      .header-title { font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .header-sub { font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .header-right { display:none; }
      .refresh-btn {
        width:36px; height:32px; padding:0;
        font-size:0; flex-shrink:0;
      }
      .refresh-btn::before { content:"↻"; font-size:16px; }
      .unanswered-item { display:grid; grid-template-columns:20px minmax(0, 1fr); gap:10px; }
      .unanswered-meta {
        grid-column:2; white-space:normal; font-size:10px; margin-top:-4px;
      }
      .gap-controls { grid-template-columns:1fr; }
      .back-link {
        width:28px; height:32px; overflow:hidden;
        color:transparent; position:relative; flex-shrink:0;
      }
      .back-link::before {
        content:"←"; color:var(--green-light);
        font-size:18px; position:absolute; left:6px; top:3px;
      }
    }
  </style>
</head>
<body>

<!-- 登入 Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <h2>後台登入</h2>
    <p>請輸入 Admin Key 以存取儀表板</p>
    <input class="modal-input" type="password" id="adminKeyInput"
      placeholder="輸入 Admin Key..." onkeydown="if(event.key==='Enter')submitLogin()" />
    <button class="modal-btn" onclick="submitLogin()">登入</button>
    <div class="modal-error" id="loginError"></div>
  </div>
</div>

<div class="header">
  <div class="header-brand">
    <img class="brand-logo" src="ecoco-logo.png" alt="ECOCO 宜可可循環經濟" />
    <div>
      <div class="header-title">ECOCO 客服後台</div>
      <div class="header-sub">DASHBOARD · 管理員視角</div>
    </div>
  </div>
  <div class="header-right">
    <a href="/" class="back-link">← 回到客服</a>
    <button class="refresh-btn" onclick="loadAll()">🔄 重新整理</button>
  </div>
</div>

<div class="container">

  <!-- 統計總覽 -->
  <div class="stats-grid" id="statsGrid">
    <div class="loading">載入中...</div>
  </div>

  <!-- AI 資料庫總覽 -->
  <div class="overview-card">
    <div class="section-title">🧭 AI 資料庫總覽</div>
    <div id="knowledgeOverview"><div class="loading">載入中...</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px" class="two-col">

    <!-- 熱門關鍵字 -->
    <div class="keyword-card">
      <div class="section-title">🔥 用戶最常問的關鍵字</div>
      <div id="keywordList"><div class="loading">載入中...</div></div>
    </div>

    <!-- 滿意度 -->
    <div class="rating-card">
      <div class="section-title">⭐ 回答滿意度</div>
      <div id="ratingChart"><div class="loading">載入中...</div></div>
    </div>

  </div>

  <!-- 知識庫管理（分類版）-->
  <div class="knowledge-card">
    <div class="section-title" style="justify-content:space-between">
      <span>📚 知識庫管理 <span id="kbCount" style="color:var(--gray-mid);font-weight:400;font-size:13px"></span></span>
      <button class="kb-add-btn" onclick="newSection()">＋ 新增分類</button>
    </div>
    <div class="kb-layout">
      <div class="kb-sidebar" id="kbSidebar"><div class="loading">載入中...</div></div>
      <div class="kb-editor">
        <div class="kb-empty" id="kbEmpty">← 從左邊點一個分類來檢視或編輯<br>或按右上角「＋ 新增分類」<br><br>修改後按「儲存」，AI 立即生效、永久保存</div>
        <div id="kbForm" style="display:none">
          <label class="kb-label">分類名稱</label>
          <input class="kb-name-input" id="kbName" placeholder="例如：點數計算規則" />
          <label class="kb-label">內容</label>
          <textarea class="kb-content-input" id="kbContent" spellcheck="false" oninput="kbCharCount()"></textarea>
          <div class="kb-actions">
            <span class="knowledge-char" id="kbChar">0 字</span>
            <div style="display:flex;gap:10px;align-items:center">
              <span class="save-msg" id="kbMsg"></span>
              <button class="kb-del-btn" id="kbDelBtn" onclick="deleteSection()">🗑 刪除</button>
              <button class="save-btn" id="kbSaveBtn" onclick="saveSection()">💾 儲存</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 評分明細 -->
  <div class="ratings-card">
    <div class="section-title">👍👎 用戶對哪些回答評分</div>
    <div id="ratingDetailList"><div class="loading">載入中...</div></div>
  </div>

  <!-- 知識缺口列表 -->
  <div class="unanswered-card">
    <div class="section-title">❓ 知識缺口列表（AI 無法回答的問題）</div>
    <div id="unansweredList"><div class="loading">載入中...</div></div>
  </div>

  <!-- 對話紀錄 -->
  <div class="sessions-card">
    <div class="section-title">💬 每次對話詳細紀錄</div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="🔍 搜尋對話內容（輸入關鍵字）"
        oninput="handleSearch(this.value)" />
      <div class="search-hint" id="searchHint"></div>
    </div>
    <div id="sessionsList"><div class="loading">載入中...</div></div>
  </div>

</div>

<script>
// ── XSS 防護：跳脫 HTML 特殊字元 ─────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Admin Key 管理 ────────────────────────────────────────
function getAdminKey() { return sessionStorage.getItem('adminKey') || ''; }

function adminFetch(url) {
  return fetch(url, { headers: { 'x-admin-key': getAdminKey() } })
    .then(res => {
      if (res.status === 401) { showLogin(); throw new Error('401'); }
      return res.json();
    });
}

// ── 登入 Modal ────────────────────────────────────────────
function showLogin() {
  document.getElementById('loginModal').classList.remove('hidden');
  document.getElementById('adminKeyInput').value = '';
  document.getElementById('loginError').textContent = '';
}

async function submitLogin() {
  const key = document.getElementById('adminKeyInput').value.trim();
  if (!key) return;

  const res = await fetch('/api/stats', { headers: { 'x-admin-key': key } });
  if (res.status === 401) {
    document.getElementById('loginError').textContent = 'Admin Key 錯誤，請重新輸入';
    return;
  }
  sessionStorage.setItem('adminKey', key);
  document.getElementById('loginModal').classList.add('hidden');
  loadAll();
}

async function loadAll() {
  await Promise.all([loadStats(), loadKnowledgeOverview(), loadKeywords(), loadSessions(), loadUnanswered(), loadRatingDetails(), loadKnowledge()]);
}

// ── 知識庫分類管理 ────────────────────────────────────────
let kbSections = [];     // 目前所有分類
let kbCurrentId = null;  // 正在編輯的 id（null = 新增中尚未存）

async function loadKnowledge() {
  const data = await adminFetch('/api/knowledge/sections');
  kbSections = data;
  document.getElementById('kbCount').textContent = `（共 ${data.length} 個分類）`;
  renderKbSidebar();
}

function renderKbSidebar() {
  const el = document.getElementById('kbSidebar');
  if (kbSections.length === 0) {
    el.innerHTML = '<div class="empty-state">尚無分類，按「＋ 新增分類」開始</div>';
    return;
  }
  el.innerHTML = kbSections.map(s => `
    <button class="kb-cat-btn ${s.id === kbCurrentId ? 'active' : ''}" onclick="selectSection(${s.id})">
      <span class="kb-cat-name">${escapeHtml(s.category)}</span>
      <span class="kb-cat-size">${s.content.length}字</span>
    </button>
  `).join('');
}

function showKbForm() {
  document.getElementById('kbEmpty').style.display = 'none';
  document.getElementById('kbForm').style.display = 'block';
  document.getElementById('kbMsg').textContent = '';
}

function selectSection(id) {
  const s = kbSections.find(x => x.id === id);
  if (!s) return;
  kbCurrentId = id;
  document.getElementById('kbName').value = s.category;
  document.getElementById('kbContent').value = s.content;
  document.getElementById('kbDelBtn').style.display = '';
  showKbForm();
  kbCharCount();
  renderKbSidebar();
}

function newSection() {
  kbCurrentId = null;
  document.getElementById('kbName').value = '';
  document.getElementById('kbContent').value = '';
  document.getElementById('kbDelBtn').style.display = 'none'; // 還沒存，不給刪
  showKbForm();
  kbCharCount();
  renderKbSidebar();
  document.getElementById('kbName').focus();
}

function kbCharCount() {
  document.getElementById('kbChar').textContent =
    document.getElementById('kbContent').value.length.toLocaleString() + ' 字';
}

async function saveSection() {
  const category = document.getElementById('kbName').value.trim();
  const content  = document.getElementById('kbContent').value;
  const msg = document.getElementById('kbMsg');
  const btn = document.getElementById('kbSaveBtn');
  if (!category) { msg.textContent = '❌ 請填分類名稱'; msg.className = 'save-msg err'; return; }

  btn.disabled = true; btn.textContent = '儲存中...'; msg.textContent = '';
  try {
    const isNew = (kbCurrentId == null);
    const url   = isNew ? '/api/knowledge/sections' : '/api/knowledge/sections/' + kbCurrentId;
    const res = await fetch(url, {
      method:  isNew ? 'POST' : 'PUT',
      headers: { 'x-admin-key': getAdminKey(), 'Content-Type': 'application/json' },
      body:    JSON.stringify({ category, content }),
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || '儲存失敗');
    if (isNew) kbCurrentId = body.id;
    msg.textContent = '✅ 已儲存，AI 立即生效'; msg.className = 'save-msg ok';
    await loadKnowledge();
    document.getElementById('kbDelBtn').style.display = '';
    renderKbSidebar();
  } catch (e) {
    msg.textContent = '❌ ' + e.message; msg.className = 'save-msg err';
  } finally {
    btn.disabled = false; btn.textContent = '💾 儲存';
    setTimeout(() => { msg.textContent = ''; }, 4000);
  }
}

async function deleteSection() {
  if (kbCurrentId == null) return;
  const s = kbSections.find(x => x.id === kbCurrentId);
  if (!confirm(`確定要刪除分類「${s ? s.category : ''}」嗎？\n此動作無法復原。`)) return;
  const msg = document.getElementById('kbMsg');
  try {
    const res = await fetch('/api/knowledge/sections/' + kbCurrentId, {
      method: 'DELETE',
      headers: { 'x-admin-key': getAdminKey() },
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || '刪除失敗');
    kbCurrentId = null;
    document.getElementById('kbForm').style.display = 'none';
    document.getElementById('kbEmpty').style.display = 'block';
    await loadKnowledge();
  } catch (e) {
    msg.textContent = '❌ ' + e.message; msg.className = 'save-msg err';
  }
}

// 對話紀錄搜尋
let searchTimer = null;
function handleSearch(val) {
  clearTimeout(searchTimer);
  const hint = document.getElementById('searchHint');
  if (val.trim().length === 0) {
    hint.textContent = '';
    loadSessions();
    return;
  }
  if (val.trim().length < 2) {
    hint.textContent = '請輸入至少 2 個字';
    return;
  }
  hint.textContent = '搜尋中...';
  searchTimer = setTimeout(() => runSearch(val.trim()), 400);
}

async function runSearch(q) {
  const hint = document.getElementById('searchHint');
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`, { headers: { 'x-admin-key': getAdminKey() } });
    if (res.status === 401) { showLogin(); return; }
    const data = await res.json();
    hint.textContent = `找到 ${data.length} 筆對話`;
    renderSessions(data);
  } catch {
    hint.textContent = '搜尋失敗';
  }
}

// 統計卡片 + 滿意度圖表
async function loadStats() {
  const data = await adminFetch('/api/stats');
  const total = data.positiveRatings + data.negativeRatings;
  const satisfactionRate = total > 0 ? Math.round(data.positiveRatings / total * 100) : 0;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon">💬</div>
      <div class="stat-num">${data.totalSessions}</div>
      <div class="stat-label">總對話次數</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📨</div>
      <div class="stat-num">${data.totalMessages}</div>
      <div class="stat-label">總訊息數</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">👍</div>
      <div class="stat-num">${satisfactionRate}%</div>
      <div class="stat-label">回答滿意率</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📊</div>
      <div class="stat-num">${total}</div>
      <div class="stat-label">收到評分數</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">❓</div>
      <div class="stat-num" style="color:#c0392b">${data.unansweredCount ?? 0}</div>
      <div class="stat-label">知識缺口數</div>
    </div>
  `;

  const pos = data.positiveRatings;
  const neg = data.negativeRatings;
  const posWidth = total > 0 ? Math.round(pos / total * 100) : 0;
  const negWidth = total > 0 ? Math.round(neg / total * 100) : 0;

  document.getElementById('ratingChart').innerHTML = `
    <div style="margin-bottom:16px;font-size:13px;color:var(--gray-mid)">
      共收到 <strong>${total}</strong> 筆評分
    </div>
    <div class="rating-bar-wrap">
      <span class="rating-label">👍 有幫助</span>
      <div class="rating-track">
        <div class="rating-fill positive" style="width:${posWidth}%"></div>
      </div>
      <span class="rating-pct">${pos} 筆</span>
    </div>
    <div class="rating-bar-wrap">
      <span class="rating-label">👎 沒幫助</span>
      <div class="rating-track">
        <div class="rating-fill negative" style="width:${negWidth}%"></div>
      </div>
      <span class="rating-pct">${neg} 筆</span>
    </div>
    <div style="margin-top:16px;font-size:12px;color:var(--gray-mid)">
      滿意率：<strong style="color:var(--green-main)">${posWidth}%</strong>
    </div>
  `;
}

async function loadKnowledgeOverview() {
  const data = await adminFetch('/api/knowledge/overview');
  const counts = data.counts || {};
  const sourceItems = (data.sourceDocuments || []).slice(0, 6).map(source => `
    <div class="source-item">
      <div class="source-title">${escapeHtml(source.source_name || '未命名來源')}</div>
      <div class="source-meta">${escapeHtml(source.role || '未提供用途')}</div>
      <div class="source-meta">AI 用途：${escapeHtml(source.recommended_ai_use || '未標記')}</div>
      ${source.caution ? `<div class="source-meta">注意：${escapeHtml(source.caution)}</div>` : ''}
    </div>
  `).join('');

  const categoryItems = (data.topCategories || []).slice(0, 8).map(([name, count]) => `
    <div class="category-item">
      <div class="category-title">${escapeHtml(name)}</div>
      <div class="category-meta">${count} 筆資料</div>
    </div>
  `).join('');

  document.getElementById('knowledgeOverview').innerHTML = `
    <div class="overview-grid">
      <div class="overview-metric">
        <div class="overview-value">${data.dbSectionCount ?? 0}</div>
        <div class="overview-label">PostgreSQL 知識分類</div>
      </div>
      <div class="overview-metric">
        <div class="overview-value">${data.importSectionCount ?? 0}</div>
        <div class="overview-label">Git 匯入分類</div>
      </div>
      <div class="overview-metric">
        <div class="overview-value">${data.ragChunkCount ?? 0}</div>
        <div class="overview-label">RAG 檢索片段</div>
      </div>
      <div class="overview-metric">
        <div class="overview-value">${counts.knowledge_rows ?? 0}</div>
        <div class="overview-label">整理後知識筆數</div>
      </div>
      <div class="overview-metric">
        <div class="overview-value">${counts.templates ?? 0}</div>
        <div class="overview-label">社群回覆範本</div>
      </div>
      <div class="overview-metric">
        <div class="overview-value">${counts.conflicts ?? 0}</div>
        <div class="overview-label">待確認衝突</div>
      </div>
      <div class="overview-metric">
        <div class="overview-value">${escapeHtml(data.autoSyncMode || 'enabled')}</div>
        <div class="overview-label">知識同步模式</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--gray-mid);line-height:1.7;margin-bottom:14px">
      產生時間：${escapeHtml(data.generatedAt || '未提供')}｜模型：${escapeHtml(data.model || '未設定')}｜資料庫最後更新：${escapeHtml(data.latestDbUpdate || '尚無紀錄')}
    </div>
    <div class="overview-columns">
      <div>
        <div class="section-title" style="font-size:13px;margin-bottom:10px">資料來源</div>
        <div class="source-list">${sourceItems || '<div class="empty-state">尚無資料來源摘要</div>'}</div>
      </div>
      <div>
        <div class="section-title" style="font-size:13px;margin-bottom:10px">主要分類</div>
        <div class="category-list">${categoryItems || '<div class="empty-state">尚無分類摘要</div>'}</div>
      </div>
    </div>
  `;
}

// 關鍵字排行
async function loadKeywords() {
  const data = await adminFetch('/api/top-questions');
  if (data.length === 0) {
    document.getElementById('keywordList').innerHTML = '<div class="empty-state">尚無資料，開始對話後會顯示統計</div>';
    return;
  }
  const max = data[0]?.count || 1;
  document.getElementById('keywordList').innerHTML = data.slice(0, 8).map((item, i) => `
    <div class="keyword-item">
      <div class="keyword-rank ${i < 3 ? 'top3' : ''}">${i + 1}</div>
      <div class="keyword-name">${item.keyword}</div>
      <div class="keyword-bar-wrap">
        <div class="keyword-bar" style="width:${Math.round(item.count / max * 100)}%"></div>
      </div>
      <div class="keyword-count">${item.count}</div>
    </div>
  `).join('');
}

// 評分明細
async function loadRatingDetails() {
  const data = await adminFetch('/api/ratings');
  if (data.length === 0) {
    document.getElementById('ratingDetailList').innerHTML =
      '<div class="empty-state">尚無評分紀錄。請到客服介面對話並按評分按鈕，內容就會出現在這裡 👆</div>';
    return;
  }
  document.getElementById('ratingDetailList').innerHTML = data.map(item => {
    const date = new Date(item.timestamp).toLocaleString('zh-TW', {
      month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
    });
    const badge = item.type === 'positive' ? '👍' : '👎';
    const q = item.question ? escapeHtml(item.question.substring(0, 80)) + (item.question.length > 80 ? '…' : '') : '（無紀錄）';
    const a = item.reply   ? escapeHtml(item.reply.substring(0, 100))   + (item.reply.length   > 100 ? '…' : '') : '（無紀錄）';
    return `
      <div class="rating-detail-item">
        <div class="rating-badge">${badge}</div>
        <div class="rating-detail-body">
          <div class="rating-detail-q">用戶問：${q}</div>
          <div class="rating-detail-a">AI 答：${a}</div>
        </div>
        <div class="rating-detail-time">${date}</div>
      </div>
    `;
  }).join('');
}

// 知識缺口列表
async function loadUnanswered() {
  const data = await adminFetch('/api/unanswered');
  if (data.length === 0) {
    document.getElementById('unansweredList').innerHTML =
      '<div class="empty-state">目前沒有知識缺口紀錄，AI 都能回答用戶問題 🎉</div>';
    return;
  }
  document.getElementById('unansweredList').innerHTML = data.map((item, idx) => {
    const date = new Date(item.timestamp).toLocaleString('zh-TW', {
      month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
    });
    const reply = item.reply ? escapeHtml(item.reply) : '';
    const reason = item.reason ? escapeHtml(item.reason) : 'AI 回覆表示知識庫沒有明確答案';
    const status = item.status || 'pending';
    const statusText = gapStatusText(status);
    const note = item.note || '';
    return `
      <div class="unanswered-item" id="gap-${idx}">
        <div class="unanswered-icon">❓</div>
        <div class="unanswered-body">
          <div class="unanswered-q">${escapeHtml(item.question)}</div>
          <div class="unanswered-reason">${reason}</div>
          <div class="gap-status ${escapeHtml(status)}">${statusText}</div>
          ${reply ? `
            <div class="unanswered-actions">
              <button class="unanswered-toggle" id="gap-toggle-${idx}" type="button" onclick="toggleGap(${idx})">查看 AI 回覆</button>
            </div>
            <div class="unanswered-reply">AI 回覆：${reply}</div>
          ` : ''}
          <div class="gap-controls">
            <select class="gap-select" id="gap-status-${idx}">
              <option value="pending" ${status === 'pending' ? 'selected' : ''}>待確認</option>
              <option value="resolved" ${status === 'resolved' ? 'selected' : ''}>已補資料</option>
              <option value="ignored" ${status === 'ignored' ? 'selected' : ''}>不需處理</option>
              <option value="manual" ${status === 'manual' ? 'selected' : ''}>需人工處理</option>
            </select>
            <input class="gap-note" id="gap-note-${idx}" value="${escapeHtml(note)}" placeholder="備註：例如已補到哪個分類、等誰確認" />
            <button class="gap-save" type="button" onclick="saveGapStatus(${item.id}, ${idx})">儲存</button>
          </div>
        </div>
        <div class="unanswered-meta">${date}</div>
      </div>
    `;
  }).join('');
}

function gapStatusText(status) {
  return {
    pending: '待確認',
    resolved: '已補資料',
    ignored: '不需處理',
    manual: '需人工處理',
  }[status] || '待確認';
}

async function saveGapStatus(id, idx) {
  const status = document.getElementById('gap-status-' + idx).value;
  const note = document.getElementById('gap-note-' + idx).value;
  const res = await fetch('/api/unanswered/' + id, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'x-admin-key': getAdminKey(),
    },
    body: JSON.stringify({ status, note }),
  });
  if (res.status === 401) {
    showLogin();
    return;
  }
  if (!res.ok) {
    alert('知識缺口狀態儲存失敗');
    return;
  }
  await loadUnanswered();
}

function toggleGap(idx) {
  const item = document.getElementById('gap-' + idx);
  const button = document.getElementById('gap-toggle-' + idx);
  item.classList.toggle('open');
  button.textContent = item.classList.contains('open') ? '收合 AI 回覆' : '查看 AI 回覆';
}

// 對話紀錄
function renderSessions(data) {
  if (data.length === 0) {
    document.getElementById('sessionsList').innerHTML = '<div class="empty-state">找不到相關對話紀錄</div>';
    return;
  }
  document.getElementById('sessionsList').innerHTML = data.map((session, idx) => {
    const startTime = new Date(session.started_at).toLocaleString('zh-TW');
    const msgCount  = Math.floor(session.message_count / 2);
    const messages  = session.messages.map(msg => `
      <div class="msg-item">
        <span class="msg-role ${msg.role}">${msg.role === 'user' ? '用戶' : 'AI'}</span>
        <div class="msg-content">${escapeHtml(msg.content)}</div>
        <div class="msg-time">${new Date(msg.timestamp).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' })}</div>
      </div>
    `).join('');

    return `
      <div class="session-item">
        <div class="session-header" onclick="toggleSession('sess-${idx}', ${idx})">
          <span class="session-id">${escapeHtml(session.session_id.substring(0, 20))}…</span>
          <span class="session-meta">${startTime}</span>
          <span class="session-count">${msgCount} 問答</span>
          <span class="session-toggle" id="toggle-${idx}">▼</span>
        </div>
        <div class="session-messages" id="sess-${idx}">
          ${messages}
        </div>
      </div>
    `;
  }).join('');
}

async function loadSessions() {
  const data = await adminFetch('/api/sessions');
  if (data.length === 0) {
    document.getElementById('sessionsList').innerHTML = '<div class="empty-state">尚無對話紀錄，對話後會自動出現在這裡</div>';
    return;
  }
  renderSessions(data);
}

function toggleSession(id, idx) {
  const el     = document.getElementById(id);
  const toggle = document.getElementById('toggle-' + idx);
  el.classList.toggle('open');
  toggle.textContent = el.classList.contains('open') ? '▲' : '▼';
}

// ── 初始化：有 key 就直接載入，沒有就顯示登入畫面 ──────
if (getAdminKey()) {
  document.getElementById('loginModal').classList.add('hidden');
  loadAll();
} else {
  showLogin();
}
</script>

</body>
