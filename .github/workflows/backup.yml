name: Weekly knowledge backup

on:
  schedule:
    - cron: '10 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Export knowledge backup
        env:
          ECOCO_BASE_URL: ${{ secrets.ECOCO_BASE_URL }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          BACKUP_DIR: backup-artifacts
        run: node scripts/backup.mjs
      - name: Upload knowledge backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecoco-knowledge-backup-${{ github.run_id }}
          path: backup-artifacts/*.json
          retention-days: 30
